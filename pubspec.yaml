name: cholo_bd
description: "Smart Travel BD - Discover and plan trips across Bangladesh."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management / DI / Navigation
  get: ^4.6.6

  # Backend (Appwrite)
  appwrite: ^12.0.4

  # Functional programming
  dartz: ^0.10.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Networking
  dio: ^5.7.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # UI helpers
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dependency_overrides:
  flutter_web_auth_2: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
